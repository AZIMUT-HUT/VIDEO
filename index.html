<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login a Video</title>
    <style>
        /* --- Estilos Generales --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* --- Contenedor Principal --- */
        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* --- Pantalla de Login (Pantalla 1) --- */
        .login-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        .login-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 320px;
            text-align: center;
        }

        .login-box h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #ffffff;
            color: #667eea;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-button:hover {
            background-color: #f0f0f0;
        }

        /* --- Pantalla de Video (Pantalla 2) --- */
        .video-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .video-container {
            width: 80%;
            max-width: 900px;
            text-align: center;
        }

        .video-container h1 {
            color: white;
            margin-bottom: 20px;
            font-weight: 300;
        }

        video {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        /* --- Estilo para el botón de descarga --- */
        .download-button {
            display: inline-block;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            background-color: #28a745;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .download-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Pantalla 1: Login -->
        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <h2>Iniciar Sesión</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" required placeholder="Escribe tu contraseña">
                    </div>
                    <button type="submit" class="login-button">Ingresar</button>
                </form>
                <p style="margin-top: 20px; font-size: 12px;">(La contraseña es: <strong>video123</strong>)</p>
            </div>
        </div>

        <!-- Pantalla 2: Video -->
        <div id="videoScreen" class="video-screen">
            <div class="video-container">
                <h1>Bienvenido</h1>
                
                <!-- 
                    CAMBIA AQUÍ EL VIDEO:
                    Reemplaza el valor del atributo 'src' en la etiqueta <source> con la URL o la ruta local a tu video.
                    Ejemplo para un video local: <source src="mi_video.mp4" type="video/mp4">

                    IMPORTANTE: Para que la descarga funcione correctamente, también debes actualizar
                    el atributo 'href' del enlace de descarga más abajo con la misma URL.
                -->
                <video id="mainVideo" controls autoplay muted>
                    <source src="video1.mp4" type="video/mp4">
                    Tu navegador no soporta la etiqueta de video.
                </video>

                <!-- 
                    ENLACE DE DESCARGA DEL VIDEO
                    - 'href': Apunta al archivo del video. DEBE ser la misma URL que en el <source> del video.
                    - 'download': Este atributo le dice al navegador que descargue el archivo en lugar de navegar a él.
                    - 'class': Aplica los estilos CSS para que parezca un botón.
                -->
                <a href="video1.mp4" 
                   class="download-button" 
                   download="mi_video_descargado.mp4">
                    Descargar Video
                </a>
            </div>
        </div>
    </div>

    <script>
        // ===================================================================
        // --- CONFIGURACIÓN DE LA CONTRASEÑA ---
        // ===================================================================
        // CAMBIA LA CONTRASEÑA AQUÍ.
        // Coloca la contraseña que deseas usar entre las comillas.
        const CORRECT_PASSWORD = "1999";
        // ===================================================================

        // --- Lógica de Transición y Validación ---
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const loginScreen = document.getElementById('loginScreen');
            const passwordInput = document.getElementById('password');
            const video = document.getElementById('mainVideo');

            loginForm.addEventListener('submit', (event) => {
                event.preventDefault();
                const enteredPassword = passwordInput.value.trim();

                if (enteredPassword === CORRECT_PASSWORD) {
                    console.log('Contraseña correcta. Iniciando transición...');
                    loginScreen.classList.add('hidden');
                    video.play().catch(error => {
                        console.error("Error al intentar reproducir el video automáticamente:", error);
                    });
                } else {
                    alert('Contraseña incorrecta. Por favor, inténtalo de nuevo.');
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            });
        });
    </script>

</body>
</html>
